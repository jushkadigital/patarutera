                          - list:
                            - listitem:
                              - strong: Itinerario – Tour Valle Sagrado
                            - listitem:
                              - list:
                                - listitem:
                                  - strong: Recojo temprano
                                  - text: ": Nos recogen entre las 6:30 y 6:45 a.m. directamente desde nuestros hoteles. Desde ese instante, comienza nuestra inmersión en la historia inca, acompañados de un guía especializado y transporte turístico cómodo."
                                - listitem:
                                  - strong: Chinchero – tradición viva
                                  - text: ": Llegamos al encantador pueblo de Chinchero, conocido como “el lugar del arcoíris”. Visitamos su centro arqueológico y apreciamos desde afuera su iglesia colonial construida sobre antiguos muros incas. Entramos a una casa artesanal donde las tejedoras locales nos muestran el arte ancestral de trabajar la lana de alpaca y oveja con pigmentos naturales."
                                - listitem:
                                  - strong: Moray – ingeniería agrícola ancestral
                                  - text: ": Continuamos hacia Moray, el antiguo laboratorio agrícola inca. Aquí observamos sus terrazas circulares, donde los incas experimentaban con microclimas para cultivar diferentes productos adaptándolos a altitudes diversas."
                                - listitem:
                                  - strong: Salineras de Maras – el oro blanco de los Andes
                                  - text: ": A pocos minutos encontramos las Salineras de Maras, un paisaje único con más de 3,000 pozas de sal activas desde tiempos preincaicos. Admiramos cómo las familias locales siguen extrayendo sal mediante técnicas heredadas de generación en generación."
                                - listitem:
                                  - strong: Almuerzo en Urubamba
                                  - text: ": Nos dirigimos a Urubamba para disfrutar de un delicioso almuerzo buffet con platos típicos, ensaladas frescas y postres andinos que nos reconfortan y renuevan energías."
                                - listitem:
                                  - strong: Ollantaytambo – la ciudad inca viviente
                                  - text: ": Luego del almuerzo, llegamos a Ollantaytambo, un sitio arqueológico impresionante. Recorremos sus calles empedradas, ascendemos sus andenes y templos incas mientras aprendemos sobre su historia como centro estratégico de defensa contra los conquistadores. Desde la cima, disfrutamos de una vista espectacular del pueblo y las montañas circundantes."
                                - listitem:
                                  - strong: Pisaq – la joya en la montaña
                                  - text: ": Para cerrar el día, visitamos Pisaq y su imponente complejo arqueológico. Caminamos entre terrazas agrícolas y recintos ceremoniales, admirando las vistas panorámicas del valle. Finalizamos con una visita al pueblo y un taller de orfebrería tradicional."
                                - listitem:
                                  - strong: Retorno a Cusco
                                  - text: ": Finalizamos el tour regresando a la ciudad. Llegamos a Cusco alrededor de las 7:00 p.m., con el cuerpo cansado pero el corazón lleno de recuerdos y aprendizajes."
                          - paragraph
